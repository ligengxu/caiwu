{% extends "base.html" %}
{% block title %}登录 - 财务管理系统{% endblock %}
{% block extra_css %}
<style>
    body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-card { background: #fff; border-radius: 20px; padding: 2.5rem; width: 100%; max-width: 420px; box-shadow: 0 20px 60px rgba(0,0,0,.15); }
    .login-card h2 { font-weight: 700; color: #1e1e2d; }
    .login-card .form-control { border-radius: 10px; padding: .75rem 1rem; border: 2px solid #e8e8e8; font-size: .95rem; }
    .login-card .form-control:focus { border-color: var(--primary); box-shadow: 0 0 0 .2rem rgba(67,97,238,.15); }
    .login-card .btn-login { width: 100%; padding: .75rem; font-size: 1rem; font-weight: 600; border-radius: 10px; background: linear-gradient(135deg, #667eea, #764ba2); border: none; }
    .login-card .btn-login:hover { opacity: .9; }
    .login-logo { width: 64px; height: 64px; background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 16px; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; }
    .login-logo i { font-size: 2rem; color: #fff; }
</style>
{% endblock %}
{% block public_content %}
<div class="login-card">
    <div class="login-logo"><i class="bi bi-cash-stack"></i></div>
    <h2 class="text-center mb-1">财务管理系统</h2>
    <p class="text-center text-muted mb-4">请登录您的账户</p>
    {% if error %}
    <div class="alert alert-danger alert-dismissible fade show" role="alert">
        {{ error }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    {% endif %}
    <form method="post" action="/login">
        <div class="mb-3">
            <label class="form-label fw-semibold">用户名</label>
            <div class="input-group">
                <span class="input-group-text bg-light border-end-0" style="border-radius:10px 0 0 10px;border:2px solid #e8e8e8;border-right:0"><i class="bi bi-person"></i></span>
                <input type="text" class="form-control border-start-0" name="username" placeholder="请输入用户名" required autofocus style="border-radius:0 10px 10px 0">
            </div>
        </div>
        <div class="mb-4">
            <label class="form-label fw-semibold">密码</label>
            <div class="input-group">
                <span class="input-group-text bg-light border-end-0" style="border-radius:10px 0 0 10px;border:2px solid #e8e8e8;border-right:0"><i class="bi bi-lock"></i></span>
                <input type="password" class="form-control border-start-0" name="password" placeholder="请输入密码" required style="border-radius:0 10px 10px 0">
            </div>
        </div>
        <button type="submit" class="btn btn-primary btn-login">登 录</button>
    </form>
    <p class="text-center text-muted mt-3 mb-0" style="font-size:.8rem">v3.0.0 · FastAPI 重构版</p>
</div>
{% endblock %}
