{% extends "base.html" %}
{% block title %}新增工资 - 财务管理系统{% endblock %}
{% block breadcrumb %}
<li class="breadcrumb-item"><a href="/dashboard">首页</a></li>
<li class="breadcrumb-item"><a href="/salary">工资管理</a></li>
<li class="breadcrumb-item active">新增工资</li>
{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="fw-bold mb-0">新增工资</h4>
    <a href="/salary" class="btn btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i>返回</a>
</div>

<div class="card">
    <div class="card-body">
        <form method="post" action="/salary/add">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">员工 <span class="text-danger">*</span></label>
                    <select name="user_id" class="form-select" required>
                        <option value="">请选择员工</option>
                        {% for u in users %}
                        <option value="{{ u.id }}">{{ u.real_name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">金额 <span class="text-danger">*</span></label>
                    <input type="number" name="amount" class="form-control" step="0.01" min="0" required placeholder="0.00">
                </div>
                <div class="col-md-6">
                    <label class="form-label">月份 <span class="text-danger">*</span></label>
                    <input type="month" name="payment_month" class="form-control" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">描述</label>
                    <input type="text" name="description" class="form-control" placeholder="工资说明">
                </div>
                <div class="col-12">
                    <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg me-1"></i>提交</button>
                    <a href="/salary" class="btn btn-outline-secondary ms-2">取消</a>
                </div>
            </div>
        </form>
    </div>
</div>
{% endblock %}
